services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: zelus
      POSTGRES_PASSWORD: zelus
      POSTGRES_DB: zelus
    ports:
      - "5432:5432"
    volumes:
      - zelus-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zelus"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  zelus-data:
